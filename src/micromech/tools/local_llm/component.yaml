name: local_llm
author: micromech
version: 0.1.0
type: custom
description: General-purpose local LLM tool (CPU). Supports model presets (qwen, gemma4)
  or custom GGUF models. No API keys needed.
license: Apache-2.0
aea_version: '>=1.0.0, <2.0.0'
entry_point: local_llm.py
serialized: true
callable: run
params:
  default_model: qwen
  available_models: qwen, gemma4
dependencies:
  llama-cpp-python:
    version: '>=0.2.0'
  huggingface-hub:
    version: '>=0.19.0'
fingerprint:
