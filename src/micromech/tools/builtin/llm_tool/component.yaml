name: llm_tool
author: micromech
version: 0.1.0
type: custom
description: General-purpose local LLM tool using Qwen 0.5B (CPU). No API keys needed.
license: Apache-2.0
aea_version: ">=1.0.0, <2.0.0"
entry_point: llm_tool.py
callable: run
params:
  default_model: Qwen/Qwen2.5-0.5B-Instruct-GGUF
dependencies:
  llama-cpp-python:
    version: ">=0.2.0"
  huggingface-hub:
    version: ">=0.19.0"
