services:
  micromech:
    build:
      context: .
      dockerfile: Dockerfile
    user: "1000:1000"
    volumes:
      - ./data:/app/data
      - ./secrets.env:/app/secrets.env
    environment:
      - TZ=Europe/Madrid
    env_file:
      - path: ./secrets.env
        required: false
    ports:
      - "127.0.0.1:8090:8090"
    restart: unless-stopped
    command: ["python", "-m", "micromech", "run", "--host", "0.0.0.0"]
    deploy:
      resources:
        limits:
          memory: 4G
