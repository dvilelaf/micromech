services:
  micromech:
    build:
      context: .
      dockerfile: Dockerfile
    user: "1000:1000"
    volumes:
      - ./data:/app/data
    environment:
      - TZ=Europe/Madrid
    env_file:
      - path: ./secrets.env
        required: false
    ports:
      - "127.0.0.1:8090:8090"
    restart: unless-stopped
    command: ["python", "-m", "micromech", "run"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8090/health')"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 4G
