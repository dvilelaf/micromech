name: micromech

services:
  micromech:
    image: dvilela/micromech:latest
    user: "1000:1000"
    volumes:
      - ./data:/app/data
    environment:
      - TZ=${TZ:-Europe/Madrid}
    env_file:
      - path: ./secrets.env
        required: false
    ports:
      - "127.0.0.1:8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 4G
    command: ["python", "-m", "micromech", "run"]

  updater:
    image: docker:cli
    environment:
      - TZ=${TZ:-Europe/Madrid}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./:/host
    working_dir: /host
    restart: unless-stopped
    command: ["sh", "-c", "while [ ! -f ./updater.sh ]; do sleep 5; done; exec sh ./updater.sh"]
